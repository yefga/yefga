<svg xmlns="http://www.w3.org/2000/svg" width="600" height="320" viewBox="0 0 600 320">
  <style>
    .terminal { fill: #1e1e2e; }
    .header { fill: #313244; }
    .btn-red { fill: #f38ba8; }
    .btn-yellow { fill: #f9e2af; }
    .btn-green { fill: #a6e3a1; }
    .title { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .prompt { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .command { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .output { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .highlight { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .location { fill: #f38ba8; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }

  </style>

  <!-- Terminal Window -->
  <rect class="terminal" width="600" height="320" rx="10" ry="10"/>

  <!-- Header Bar -->
  <rect class="header" width="600" height="32" rx="10" ry="10"/>
  <rect class="terminal" y="22" width="600" height="12"/>

  <!-- Window Buttons -->
  <circle class="btn-red" cx="20" cy="16" r="6"/>
  <circle class="btn-yellow" cx="40" cy="16" r="6"/>
  <circle class="btn-green" cx="60" cy="16" r="6"/>

  <!-- Title -->
  <text class="title" x="300" y="20" text-anchor="middle">yefga@life ~</text>

  <!-- Status -->
  <text class="prompt" x="20" y="60">$</text>
  <text class="command" x="35" y="60">whoami --status</text>

  <text class="output" x="20" y="90">On a sabbatical.</text>
  <text class="output" x="20" y="110">Open to work, though that hasn't</text>
  <text class="output" x="20" y="130">quite worked out lately.</text>

  <text class="dim" x="20" y="160">// currently</text>
  <text class="highlight" x="20" y="180">Observing and building messy with AI</text>
  <text class="highlight" x="20" y="200">in different flavors.</text>

  <!-- Location -->
  <text class="prompt" x="20" y="235">$</text>
  <text class="command" x="35" y="235">echo $LOCATION</text>

  <text class="location" x="20" y="262">Indonesia</text>
  <text class="dim" x="20" y="285">// open to relocate, teleport, levitate, evaporate,</text>
  <text class="dim" x="20" y="302">// reincarnate, accelerate, migrate. just hire me.</text>
  <text class="dim" x="395" y="302">/
    <animateTransform attributeName="transform" type="rotate" from="0 398 297" to="360 398 297" dur="1s" repeatCount="indefinite" />
  </text>

</svg>
