<svg xmlns="http://www.w3.org/2000/svg" width="650" height="500" viewBox="0 0 650 500">
  <style>
    .terminal { fill: #1e1e2e; }
    .header { fill: #313244; }
    .btn-red { fill: #f38ba8; }
    .btn-yellow { fill: #f9e2af; }
    .btn-green { fill: #a6e3a1; }
    .title { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .prompt { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .command { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 13px; }
    .output { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .dim { fill: #6c7086; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .highlight { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .location { fill: #f38ba8; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 12px; }
    .table-header { fill: #cdd6f4; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; font-weight: bold; }
    .company { fill: #89b4fa; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
    .app { fill: #f9e2af; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
    .loc { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
    .status { fill: #a6e3a1; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 10px; }
    .section { fill: #cba6f7; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; }
    .cursor { fill: #cdd6f4; animation: blink 1s step-end infinite; }
    @keyframes blink { 50% { opacity: 0; } }
  </style>

  <!-- Terminal Window -->
  <rect class="terminal" width="650" height="500" rx="10" ry="10"/>

  <!-- Header Bar -->
  <rect class="header" width="650" height="32" rx="10" ry="10"/>
  <rect class="terminal" y="22" width="650" height="12"/>

  <!-- Window Buttons -->
  <circle class="btn-red" cx="20" cy="16" r="6"/>
  <circle class="btn-yellow" cx="40" cy="16" r="6"/>
  <circle class="btn-green" cx="60" cy="16" r="6"/>

  <!-- Title -->
  <text class="title" x="325" y="20" text-anchor="middle">yefga@life ~</text>

  <!-- Status -->
  <text class="prompt" x="20" y="60">$</text>
  <text class="command" x="35" y="60">whoami --status</text>

  <text class="output" x="20" y="90">On a sabbatical.</text>
  <text class="output" x="20" y="110">Open to work, though that hasn't</text>
  <text class="output" x="20" y="130">quite worked out lately.</text>

  <text class="dim" x="20" y="160">// currently</text>
  <text class="highlight" x="20" y="180">Observing and building messy with AI</text>
  <text class="highlight" x="20" y="200">in different flavors.</text>

  <!-- My Creations -->
  <text class="prompt" x="20" y="235">$</text>
  <text class="command" x="35" y="235">ls ~/my_creations</text>

  <text class="company" x="20" y="260">Karafuru</text>
  <text class="dim" x="100" y="260">macOS App</text>
  <text class="status" x="200" y="260">Available</text>

  <!-- Past Contributions -->
  <text class="prompt" x="20" y="295">$</text>
  <text class="command" x="35" y="295">cat ~/past_contributions.csv</text>

  <!-- Table Header -->
  <text class="table-header" x="20" y="322">COMPANY</text>
  <text class="table-header" x="160" y="322">APP</text>
  <text class="table-header" x="390" y="322">LOCATION</text>
  <text class="table-header" x="530" y="322">APP STORE</text>
  <line x1="20" y1="330" x2="620" y2="330" stroke="#6c7086" stroke-width="1"/>

  <!-- Table Rows -->
  <text class="company" x="20" y="350">BNI</text>
  <text class="app" x="160" y="350">Banking (Super App)</text>
  <text class="loc" x="390" y="350">Indonesia</text>
  <text class="status" x="530" y="350">Available</text>

  <text class="company" x="20" y="372">Ajaib</text>
  <text class="app" x="160" y="372">Stock &amp; Crypto Trading</text>
  <text class="loc" x="390" y="372">Indonesia</text>
  <text class="status" x="530" y="372">Available</text>

  <text class="company" x="20" y="394">Privy</text>
  <text class="app" x="160" y="394">Digital Signature</text>
  <text class="loc" x="390" y="394">Indonesia</text>
  <text class="status" x="530" y="394">Available</text>

  <text class="company" x="20" y="416">點點閱</text>
  <text class="app" x="160" y="416">Book Summary</text>
  <text class="loc" x="390" y="416">Hong Kong/Taiwan</text>
  <text class="status" x="530" y="416">Available</text>

  <!-- Location -->
  <text class="prompt" x="20" y="451">$</text>
  <text class="command" x="35" y="451">echo $LOCATION</text>

  <text class="location" x="20" y="476">Indonesia</text>
  <text class="dim" x="20" y="493">// open to relocate, teleport, levitate, evaporate, reincarnate,</text>
  <text class="dim" x="20" y="507">// accelerate, migrate. just hire me.</text>

</svg>
